<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>SNX Chat</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, sans-serif;
      background: #0f0f0f;
      color: #e0e0e0;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    header {
      padding: 12px 20px;
      background: #1a1a1a;
      border-bottom: 1px solid #2a2a2a;
      font-size: 14px;
      color: #888;
    }
    header span { color: #fff; font-weight: 600; }

    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .msg {
      max-width: 70%;
      padding: 10px 14px;
      border-radius: 12px;
      line-height: 1.5;
      font-size: 14px;
      white-space: pre-wrap;
    }
    .msg.assistant {
      background: #1e1e1e;
      border: 1px solid #2a2a2a;
      align-self: flex-start;
    }
    .msg.user {
      background: #2563eb;
      color: #fff;
      align-self: flex-end;
    }
    .msg.system {
      background: transparent;
      color: #555;
      font-size: 12px;
      align-self: center;
      border: none;
      padding: 0;
    }
    .msg.error {
      background: #3b0a0a;
      border: 1px solid #7f1d1d;
      color: #fca5a5;
      align-self: flex-start;
    }

    .files {
      align-self: flex-start;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 4px;
    }
    .files a {
      display: inline-block;
      padding: 4px 10px;
      background: #1a2a1a;
      border: 1px solid #2a4a2a;
      border-radius: 6px;
      color: #4ade80;
      font-size: 12px;
      text-decoration: none;
    }
    .files a:hover { background: #1f3a1f; }

    #footer {
      padding: 12px 20px;
      background: #1a1a1a;
      border-top: 1px solid #2a2a2a;
      display: flex;
      gap: 8px;
    }

    #input {
      flex: 1;
      background: #111;
      border: 1px solid #333;
      border-radius: 8px;
      padding: 10px 14px;
      color: #e0e0e0;
      font-size: 14px;
      outline: none;
      resize: none;
      height: 42px;
      line-height: 1.4;
    }
    #input:focus { border-color: #555; }
    #input:disabled { opacity: 0.4; cursor: not-allowed; }

    #send {
      padding: 0 18px;
      background: #2563eb;
      border: none;
      border-radius: 8px;
      color: #fff;
      font-size: 14px;
      cursor: pointer;
      white-space: nowrap;
    }
    #send:hover { background: #1d4ed8; }
    #send:disabled { background: #1e293b; color: #475569; cursor: not-allowed; }

    .typing {
      align-self: flex-start;
      color: #555;
      font-size: 13px;
      padding: 4px 0;
    }
    .typing span { animation: blink 1s infinite; }
    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes blink { 0%,80%,100% { opacity: 0.2 } 40% { opacity: 1 } }
  </style>
</head>
<body>

<header>
  SNX Chat &nbsp;·&nbsp; <span id="status">ready</span>
  <span id="run-id" style="margin-left:12px;font-size:11px;"></span>
</header>

<div id="chat"></div>

<div id="footer">
  <textarea id="input" placeholder="Type a prompt and press Enter…" rows="1"></textarea>
  <button id="send">Send</button>
</div>

<script>
const API = 'http://localhost:8000';

let runId = null;
let es = null;         // EventSource
let isIdle = false;

const chat   = document.getElementById('chat');
const input  = document.getElementById('input');
const send   = document.getElementById('send');
const status = document.getElementById('status');
const runIdEl = document.getElementById('run-id');

function setStatus(s, color = '#888') {
  status.textContent = s;
  status.style.color = color;
}

function addMsg(cls, text) {
  if (!text.trim()) return null;
  const el = document.createElement('div');
  el.className = `msg ${cls}`;
  el.textContent = text;
  chat.appendChild(el);
  chat.scrollTop = chat.scrollHeight;
  return el;
}

function showFiles(files) {
  if (!files || !files.length) return;
  const el = document.createElement('div');
  el.className = 'files';
  files.forEach(f => {
    const a = document.createElement('a');
    a.href = `${API}/sessions/${runId}/files/${f}`;
    a.target = '_blank';
    a.textContent = '📄 ' + f;
    el.appendChild(a);
  });
  chat.appendChild(el);
  chat.scrollTop = chat.scrollHeight;
}

let typingEl = null;
function showTyping() {
  if (typingEl) return;
  typingEl = document.createElement('div');
  typingEl.className = 'typing';
  typingEl.innerHTML = '<span>●</span><span>●</span><span>●</span>';
  chat.appendChild(typingEl);
  chat.scrollTop = chat.scrollHeight;
}
function hideTyping() {
  if (typingEl) { typingEl.remove(); typingEl = null; }
}

function setIdle(idle) {
  isIdle = idle;
  input.disabled = !idle;
  send.disabled = !idle;
  if (idle) {
    input.focus();
    setStatus('idle — waiting for input', '#4ade80');
  }
}

function openStream() {
  es = new EventSource(`${API}/sessions/${runId}/stream`);

  es.onmessage = (e) => {
    const msg = JSON.parse(e.data);

    if (msg.type === 'assistant' && msg.text) {
      hideTyping();
      addMsg('assistant', msg.text);
    } else if (msg.type === 'idle') {
      hideTyping();
      if (msg.files && msg.files.length) showFiles(msg.files);
      setIdle(true);
    } else if (msg.type === 'result') {
      // ResultMessage fires after every turn — not the end of the session.
      // Just ignore it; the 'idle' event that follows will enable input.
    } else if (msg.type === 'timeout') {
      hideTyping();
      addMsg('error', msg.message || 'Session timed out.');
      setStatus('timed out', '#f87171');
      setIdle(false);
      es.close();
    } else if (msg.type === 'error') {
      hideTyping();
      addMsg('error', msg.message || 'Unknown error');
      setStatus('error', '#f87171');
      setIdle(false);
      es.close();
    } else if (msg.type === 'ping') {
      // keep-alive, ignore
    }
  };

  es.onerror = () => {
    // SSE closes when session ends — only show error if not done
    if (status.textContent !== 'done') {
      setStatus('disconnected', '#f87171');
    }
    es.close();
  };
}

async function startSession(prompt) {
  setStatus('starting…', '#facc15');
  setIdle(false);
  showTyping();

  const res = await fetch(`${API}/sessions`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ prompt }),
  });
  const data = await res.json();
  runId = data.run_id;
  runIdEl.textContent = runId;
  setStatus('running', '#facc15');
  openStream();
}

async function sendInput(message) {
  setIdle(false);
  showTyping();
  await fetch(`${API}/sessions/${runId}/input`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ message }),
  });
}

function submit() {
  const text = input.value.trim();
  if (!text) return;
  input.value = '';

  addMsg('user', text);

  if (!runId) {
    startSession(text);
  } else if (isIdle) {
    sendInput(text);
  }
}

send.addEventListener('click', submit);
input.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    submit();
  }
});

// Start disabled until first message
setIdle(true);
setStatus('ready', '#4ade80');
</script>
</body>
</html>
